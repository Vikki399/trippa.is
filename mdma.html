<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDMA - Psychedelic.is</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <nav class="bg-black p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-bold text-green-400">Psychedelic.is</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-5xl font-bold mb-2">MDMA (Ecstasy / Molly)</h1>
        <p class="text-xl text-purple-400">Empathogen</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12">
            <div>
                <h2 class="text-2xl font-semibold mb-4">Skammtar (Oral)</h2>
                <ul class="space-y-2 text-gray-300">
                    <li><strong>Létt:</strong> 80-120 mg</li>
                    <li><strong>Miðlungs:</strong> 120-200 mg</li>
                </ul>
            </div>
            <div>
                <h2 class="text-2xl font-semibold mb-4">Áhrif og áhætta</h2>
                <p class="text-gray-300">Serotonin losun. Hætta á ofhitnun, ofvökvun. Ekki taka oftar en á 3 mánaða fresti.</p>
            </div>
        </div>
    </div>
</body>
</html>
