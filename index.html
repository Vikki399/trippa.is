<script>
const substances = [
    { name: "LSD", slug: "lsd", desc: "Lysergic acid diethylamide - klassískt sálfræðiefni" },
    { name: "Psilocybin", slug: "psilocybin", desc: "Sveppaefni úr töfrasveppum" },
    { name: "MDMA", slug: "mdma", desc: "Empathogen og stimulant" },
    { name: "DMT", slug: "dmt", desc: "Dimethyltryptamine - sterkur tryptamín" },
    { name: "Ketamín", slug: "ketamine", desc: "Dissociative" },
    { name: "Mescaline", slug: "mescaline", desc: "Náttúrulegt sálfræðiefni úr kaktusum" },
    { name: "Cocaine", slug: "cocaine", desc: "Örvandi efni (stimulant)" },
    { name: "Crystal Meth", slug: "CrystalMeth", desc: "Methamphetamine - öflugt örvandi efni" },
    { name: "Heroin", slug: "heroine", desc: "Ópíóíð" },
    { name: "Fentanyl", slug: "fentanyl", desc: "Mjög öflugt tilbúið ópíóíð" },
    { name: "OxyContin", slug: "oxycontin", desc: "Lyfseðilsskylt ópíóíð" }
];

const grid = document.querySelector('#efni .grid');

substances.forEach(sub => {
    const card = document.createElement('a');
    card.href = `${sub.slug}.html`;
    card.className = "block bg-gray-800 rounded-xl p-6 hover:bg-gray-700 transition";
    card.innerHTML = `
        <h3 class="text-2xl font-semibold mb-2">${sub.name}</h3>
        <p class="text-gray-400">${sub.desc}</p>
    `;
    grid.appendChild(card);
});
</script>
